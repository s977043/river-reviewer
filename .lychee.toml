# Lychee Link Checker Configuration
# https://github.com/lycheeverse/lychee

# Maximum number of redirects to follow
max_redirects = 5

# Maximum number of concurrent network requests
max_concurrency = 8

# Exclude patterns (regex)
exclude = [
  # Email addresses
  '^mailto:',

  # Localhost and development servers
  '^https?://localhost',
  '^https?://127\.0\.0\.1',

  # Common placeholders in documentation
  'example\.com',
  'your-org/',

  # Sites that commonly block bots or require authentication
  '^https?://([^/]+\.)?linkedin\.com',
  '^https?://discord\.gg',
  '^https?://discord\.com/invite',
  '^https?://t\.co', # Twitter short links
  '^https?://([^/]+\.)?slack\.com',

  # GitHub URLs that may not exist yet (for PRs)
  # Uncomment if needed:
  # 'github\.com/.*/tree/main/.*',
  # 'github\.com/.*/pull/\d+',
  # Compare URLs exist only after tag creation (release-please chicken-and-egg)
  'github\.com/.*/compare/',

  # Upstream openai/skills repository moves `.experimental` / `.curated`
  # subdirectories around; these references are documentation pointers
  # in Codex-installed agent skills (.codex/) and don't need to be
  # perpetually live for river-review functionality.
  '^https?://github\.com/openai/skills/tree/.+/skills/\.',

  # openai.com/pricing returns 403 to bot user-agents (Cloudflare challenge);
  # the URL is valid in browsers, so we link to it from the cost estimation
  # guide without making CI gate on it.
  '^https?://openai\.com/pricing',

  # Large citation PDF that exceeds the request timeout under HEAD checks;
  # it is a paper reference in a skill README, not a functional link.
  '^https?://student\.cs\.uwaterloo\.ca/',

]

# Exclude specific files that contain Docusaurus-internal routing links.
# CHANGELOG.md is release-please-generated and references many issue/PR URLs;
# older entries point at the pre-rename repo name (s977043/river-reviewer) and
# to issues that 404 over time, which is not actionable. Skip it (#1065).
exclude_path = ["pages/index\\.md$", "pages/index\\.en\\.md$", "CHANGELOG\\.md$"]

# Accept status codes
# Redirects are handled by max_redirects (not listed here to ensure permanent redirects are visible in logs)
accept = [
  # Success codes only
  "200", "201", "202", "203", "204",
  # Server error codes to accept (temporary issues)
  "500", # Internal Server Error - may be temporary
  "503", # Service Unavailable - transient (e.g. note.com maintenance windows)
  "429", # Too Many Requests - rate limiting, not a broken link
  # Client error codes to accept (use carefully)
  # "403", # Forbidden - some sites block automated requests
  # "429", # Too Many Requests
]

# Exclude all private IPs from checking
exclude_all_private = true

# Include fragments in link checking (important for internal anchor links in documentation)
include_fragments = true

# Cache results for faster subsequent runs
cache = true

# User agent string
user_agent = "Mozilla/5.0 (compatible; River-Review-LinkChecker/1.0; +https://github.com/s977043/river-review)"

# Timeout per request (in seconds)
timeout = 30

# Retry failed requests
max_retries = 3

# Headers to send with requests (helps with some sites that block bots)
# header = { "accept" = "text/html" }

# Methods to use for checking (HEAD is faster and sufficient for link validation)
# Note: Some servers don't support HEAD properly. If issues arise, change back to "get"
method = "head"
