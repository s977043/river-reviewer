name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout (for floating tags)
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update major alias tag (v0, v1, ...)
        if: ${{ steps.release.outputs.release_created }}
        run: |
          set -euo pipefail
          TAG="${{ steps.release.outputs.tag_name }}"

          # Expect plain tag format like "v0.14.0".
          # Defensive: reject component-prefixed tags (e.g. "river-reviewer-v0.14.0")
          # to avoid generating garbled alias names like "vriver-reviewer-v0".
          # See #597 for the original bug.
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Unexpected tag format: ${TAG}. Expected plain vX.Y.Z."
            echo "::error::Check release-please-config.json include-component-in-tag setting."
            exit 1
          fi

          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          MAJOR_TAG="v${MAJOR}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch --tags --force
          COMMIT="$(git rev-list -n 1 "${TAG}")"

          git tag -f "${MAJOR_TAG}" "${COMMIT}"
          git push --force origin "refs/tags/${MAJOR_TAG}"
