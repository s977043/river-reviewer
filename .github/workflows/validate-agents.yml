name: Validate Agent Specs

on:
  pull_request:
    paths:
      - 'agents/**'
      - '.github/river-reviewer/**'
      - '.github/workflows/validate-agents.yml'
      - 'docs/agents.md'
      - 'package.json'
      - 'scripts/validate-agents.mjs'
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - '.github/river-reviewer/**'
      - '.github/workflows/validate-agents.yml'
      - 'docs/agents.md'
      - 'package.json'
      - 'scripts/validate-agents.mjs'

jobs:
  schema:
    name: Validate agent schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-deps

      - name: Run agent schema validation
        run: npm run agents:validate
