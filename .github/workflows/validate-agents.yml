name: Validate Agent Specs

on:
  pull_request:
    paths:
      - 'agents/**'
      - '.github/river-reviewer/**'
      - '.github/workflows/validate-agents.yml'
      - 'docs/agents.md'
      - 'package.json'
      - 'scripts/validate-agents.mjs'
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - '.github/river-reviewer/**'
      - '.github/workflows/validate-agents.yml'
      - 'docs/agents.md'
      - 'package.json'
      - 'scripts/validate-agents.mjs'

permissions:
  contents: read

concurrency:
  group: validate-agents-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema:
    name: Validate agent schema
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run agent schema validation
        run: npm run agents:validate
