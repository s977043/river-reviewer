name: River Reviewer

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: river-reviewer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  river-reviewer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-deps
      - name: Run River Reviewer (midstream)
        uses: ./runners/github-action
        with:
          phase: midstream
          dry_run: true # set false after verifying secrets/models
          debug: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
