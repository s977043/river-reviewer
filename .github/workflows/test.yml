name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - name: Run linters
        run: npm run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run unit tests with coverage
        run: NODE_V8_COVERAGE=coverage npm test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          directory: coverage
          flags: unittests
          fail_ci_if_error: false

  skill-validation:
    name: Skill schema validation
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - name: Validate skills
        run: npm run skills:validate
      - name: Validate agent-skills
        run: npm run agent-skills:validate

  meta-check:
    name: Meta consistency
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - run: npm run meta:validate

  dist-check:
    name: Action dist freshness
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check dist is up to date
        run: |
          src_ts=$(git log -1 --format=%ct -- 'runners/github-action/src/' 'src/')
          dist_ts=$(git log -1 --format=%ct -- 'runners/github-action/dist/')

          if [ -z "$src_ts" ]; then
            echo "No bundled-source commits in history; skipping dist staleness check."
            exit 0
          fi

          if [ -z "$dist_ts" ]; then
            echo "::error::runners/github-action/dist/ has never been committed. Run 'npm run build:action' and commit."
            exit 1
          fi

          if [ "$src_ts" -gt "$dist_ts" ]; then
            src_date=$(git log -1 --format=%ci -- 'runners/github-action/src/' 'src/')
            dist_date=$(git log -1 --format=%ci -- 'runners/github-action/dist/')
            echo "::error::dist/ is stale. Source last changed at ${src_date} but dist last rebuilt at ${dist_date}. Run 'npm run build:action' and commit."
            echo "Recent src changes:"
            git log -3 --oneline -- 'runners/github-action/src/' 'src/'
            exit 1
          fi

          src_date=$(git log -1 --format=%ci -- 'runners/github-action/src/' 'src/')
          dist_date=$(git log -1 --format=%ci -- 'runners/github-action/dist/')
          echo "dist/ is current (dist: ${dist_date}, src: ${src_date})"

  integration-test:
    name: Integration (CLI)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-deps
      - name: Run CLI integration tests
        run: npm test -- tests/integration/local-review.test.mjs
