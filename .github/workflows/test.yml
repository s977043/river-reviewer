name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - name: Run linters
        run: npm run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run unit tests with coverage
        run: NODE_V8_COVERAGE=coverage npm test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          directory: coverage
          flags: unittests
          fail_ci_if_error: false

  skill-validation:
    name: Skill schema validation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - name: Validate skills
        run: npm run skills:validate
      - name: Validate agent-skills
        run: npm run agent-skills:validate

  meta-check:
    name: Meta consistency
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - run: npm run meta:validate

  dist-check:
    name: Action dist freshness
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - run: npm run build:action
      - name: Check dist is up to date
        run: |
          if ! git diff --quiet runners/github-action/dist/; then
            echo "::error::dist/ is out of date. Run 'npm run build:action' and commit."
            git diff --stat runners/github-action/dist/
            exit 1
          fi

  integration-test:
    name: Integration (CLI)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-deps
      - name: Run CLI integration tests
        run: npm test -- tests/integration/local-review.test.mjs
