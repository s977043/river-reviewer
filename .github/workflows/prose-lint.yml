name: Prose Lint
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: prose-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: errata-ai/vale-action@v2
        with:
          filter_mode: added
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
