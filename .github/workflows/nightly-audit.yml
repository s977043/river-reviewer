name: Nightly Measure & Audit

on:
  schedule:
    - cron: '0 18 * * *' # 03:00 JST
  workflow_dispatch:

concurrency:
  group: nightly-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  measure:
    name: Measure review quality signals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run unified evaluation
        id: eval
        run: |
          node scripts/evaluate-all.mjs \
            --json \
            --append-ledger \
            --description "nightly-audit $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > eval-output.json 2>&1 || true
          cat eval-output.json

      - name: Generate audit report
        run: node scripts/generate-audit-report.mjs eval-output.json

      - name: Write GitHub Step Summary
        if: always()
        run: |
          if [ -f audit-report.md ]; then
            cat audit-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-audit-${{ github.run_number }}
          path: |
            eval-output.json
            audit-report.md
            artifacts/evals/results.jsonl
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload ledger for long-term retention
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-ledger-${{ github.run_number }}
          path: artifacts/evals/results.jsonl
          retention-days: 365
          if-no-files-found: ignore
