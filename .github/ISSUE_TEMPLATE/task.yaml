---
name: Task
description: 新しいタスク（Issue）を作成するためのテンプレート
title: '[Task] '
labels: ['type:task', 'status:triage']
body:
  - type: input
    id: summary
    attributes:
      label: 概要
      placeholder: このタスクが何をするものなのか
    validations:
      required: true

  - type: input
    id: prev
    attributes:
      label: 前のタスク Issue 番号
      placeholder: e.g. #12
    validations:
      required: false

  - type: input
    id: next
    attributes:
      label: 次のタスク Issue 番号
      placeholder: e.g. #14
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件
      placeholder: 完了条件を書いてください
    validations:
      required: true

  - type: textarea
    id: pre_implementation
    attributes:
      label: Pre-implementation checklist
      description: 着手前に必ず満たすこと。既存資産確認と実行計画の用意は必須。
      value: |
        - [ ] 既存コードベース・skill・docs を確認して重複や前提を洗い出した
        - [ ] 実行計画（変更対象ファイル、影響範囲、検証手順）を本 Issue または PR に記載した
        - [ ] 受け入れ条件が現状でも妥当か再確認した
    validations:
      required: true
