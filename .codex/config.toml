# Project-local Codex defaults for river-reviewer
# Opt in explicitly:
#   REPO_ROOT=$(git rev-parse --show-toplevel)
#   CODEX_HOME="$REPO_ROOT/.codex" codex -C "$REPO_ROOT"
#
# Choose model, profile, web search, or extra writable dirs at runtime:
#   --model <MODEL>
#   --profile <NAME>
#   --search
#   --add-dir <DIR>
#
# Do not set web search or sandbox-bypass flags here.
# approval_policy is on-request (equivalent to `--full-auto` when combined with
# sandbox_mode = workspace-write); safety relies on sandbox_mode and shell_environment_policy.
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# Optional tuning (uncomment only after team agreement)
# model_reasoning_effort = "high"

[shell_environment_policy]
# Forward as few env vars as possible to reduce accidental secret leakage.
include_only = ["PATH", "HOME", "USER", "SHELL", "LANG", "LC_ALL"]
