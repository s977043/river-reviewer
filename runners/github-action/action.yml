name: 'River Reviewer'
description: 'Run River Reviewer CLI with phase-aware planning.'
inputs:
  phase:
    description: 'Review phase (upstream|midstream|downstream).'
    required: false
    default: 'midstream'
  planner:
    description: 'Planner mode (off|order|prune).'
    required: false
    default: 'off'
  target:
    description: 'Path to the git repository to review.'
    required: false
    default: '.'
  comment:
    description: 'Post a PR comment with results (only on pull_request events).'
    required: false
    default: 'true'
  dry_run:
    description: 'Run in dry-run mode (no external calls, print to stdout).'
    required: false
    default: 'true'
  debug:
    description: 'Print debug information (merge base, token estimates, prompt preview).'
    required: false
    default: 'false'
  estimate:
    description: 'Estimate cost only without running the review.'
    required: false
    default: 'false'
  max_cost:
    description: 'Abort if estimated USD cost exceeds this value.'
    required: false
    default: ''
  node_version:
    description: 'Node.js version to use.'
    required: false
    default: '20'
  output_format:
    description: 'Output format (text|markdown|json).'
    required: false
    default: 'markdown'
outputs:
  json_path:
    description: 'Path to the JSON output file (only when output_format=json).'
    value: ${{ steps.river.outputs.json_path }}
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node_version }}
    - name: Run River Reviewer
      id: river
      shell: bash
      env:
        RIVER_REPO_ROOT: ${{ github.action_path }}/../..
        RIVER_OUTPUT_FORMAT: ${{ inputs.output_format }}
      run: |
        set -euo pipefail
        export RIVER_REPO_ROOT="$(cd "${RIVER_REPO_ROOT}" && pwd)"
        repo_path="$(cd "${{ inputs.target }}" && pwd)"

        # Validate output format
        output_fmt="${RIVER_OUTPUT_FORMAT}"
        if [[ ! "${output_fmt}" =~ ^(text|markdown|json)$ ]]; then
          echo "::error::Invalid output_format: ${output_fmt}"
          exit 1
        fi

        cmd=(node "${GITHUB_ACTION_PATH}/dist/index.mjs" run "${repo_path}" --phase "${{ inputs.phase }}" --planner "${{ inputs.planner }}" --output "${output_fmt}")
        if [ "${{ inputs.dry_run }}" = "true" ]; then
          cmd+=("--dry-run")
        fi
        if [ "${{ inputs.debug }}" = "true" ]; then
          cmd+=("--debug")
        fi
        if [ "${{ inputs.estimate }}" = "true" ]; then
          cmd+=("--estimate")
        fi
        if [ -n "${{ inputs.max_cost }}" ]; then
          cmd+=("--max-cost" "${{ inputs.max_cost }}")
        fi
        echo "Running: ${cmd[*]}"

        if [ "${output_fmt}" = "json" ]; then
          json_out="${RUNNER_TEMP}/river-reviewer-output.json"
          "${cmd[@]}" > "${json_out}"
          echo "json_path=${json_out}" >> "${GITHUB_OUTPUT}"
          cat "${json_out}"
        else
          out="${RUNNER_TEMP}/river-reviewer-comment.md"
          "${cmd[@]}" | tee "${out}"
          echo "comment_path=${out}" >> "${GITHUB_OUTPUT}"
        fi

    - name: Post PR comment
      if: ${{ github.event_name == 'pull_request' && inputs.comment == 'true' && inputs.estimate != 'true' && inputs.output_format != 'json' }}
      uses: actions/github-script@v8
      env:
        RIVER_REVIEWER_COMMENT_PATH: ${{ steps.river.outputs.comment_path }}
      with:
        script: |
          const postComment = require(`${process.env.GITHUB_ACTION_PATH}/post-comment.cjs`);
          await postComment({ github, context, core });
branding:
  icon: 'play-circle'
  color: 'blue'
