# promptfoo configuration for Figma Design Drift Detector
# Status: scaffolding. See ../README.md for golden-generation workflow.

prompts:
  - file://../prompt/system.md
  - file://../prompt/user.md

providers:
  - id: anthropic:claude-3-5-sonnet-20241022
    config:
      temperature: 0.1
      max_tokens: 2000

  - id: openai:gpt-4o
    config:
      temperature: 0.1
      max_tokens: 2000

tests:
  - description: hardcoded hex color and pixel padding should be flagged as token violations
    vars:
      diff: file://../fixtures/01-hardcoded-color-happy.md
    assert:
      - type: llm-rubric
        value: |
          The output must identify `#3B82F6` as a hardcoded color violation,
          include a TokenSuggestion referencing a color token or Tailwind class
          (e.g., `text-blue-500`, `var(--color-primary)`), and the finding must
          be grounded in the diff evidence (filename + code snippet).
          Score 1 if all three conditions are met; 0 otherwise.
      - type: contains
        value: 'Severity: minor'

  - description: Tailwind utility classes must NOT be flagged as token violations
    vars:
      diff: file://../fixtures/02-tailwind-token-false-positive.md
    assert:
      - type: llm-rubric
        value: |
          The output must NOT flag any of the Tailwind utility classes
          (`bg-blue-500`, `p-4`, `rounded-lg`, `shadow-md`, `text-sm`) as
          design token violations. Tailwind utilities ARE the token system.
          Acceptable outputs include "No findings" or explicit citation of the
          Tailwind utility guard. Score 1 if no finding is produced; 0 otherwise.
