# promptfoo configuration for a11y Accessible Name Basics
# Status: scaffolding. See ../README.md for golden-generation workflow.

prompts:
  - file://../prompt/system.md
  - file://../prompt/user.md

providers:
  - id: openai:gpt-4o
    config:
      temperature: 0.1
      max_tokens: 2000

  - id: anthropic:claude-3-5-sonnet-20241022
    config:
      temperature: 0.1
      max_tokens: 2000

tests:
  - description: icon-only button without aria-label must be flagged
    vars:
      diff: file://../fixtures/01-icon-button-happy.md
    assert:
      - type: llm-rubric
        value: |
          The output must include a Finding about missing accessible name on a `<button>`,
          and the Fix must suggest `aria-label` (or visible text).
          Score 1 if both are present; 0 otherwise.
      - type: contains
        value: 'Severity: minor'

  - description: aria-hidden decorative img must NOT be flagged
    vars:
      diff: file://../fixtures/02-decorative-img-false-positive.md
    assert:
      - type: llm-rubric
        value: |
          The output must NOT flag the `<img>` element. Acceptable outputs include
          "No findings" or explicit reference to the `aria-hidden` guard.
          Score 1 if no finding is produced; 0 otherwise.
