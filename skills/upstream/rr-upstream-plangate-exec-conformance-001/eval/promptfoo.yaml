# promptfoo evaluation configuration
# See https://www.promptfoo.dev/docs/configuration/guide

description: 'Evaluation for PlanGate Exec Conformance Guard'

providers:
  - id: openai:gpt-4o-mini
    config:
      temperature: 0.1

prompts:
  - file://../prompt/system.md
  - file://../prompt/user.md

tests:
  # Test case 1: True positive — undocumented new dependency (redis)
  - description: 'Detect undocumented new dependency (redis) vs plan'
    vars:
      diff: file://../fixtures/01-true-positive-undocumented-dependency.md
    assert:
      - type: contains-any
        value:
          - 'redis'
          - 'ioredis'
          - '依存'
          - '方針整合'
      - type: contains-any
        value:
          - 'warning'
          - 'severity=warning'
          - 'major'

  # Test case 2: False positive — explicit out-of-scope items should be suppressed
  - description: 'No false positive on explicit out-of-scope items'
    vars:
      diff: file://../fixtures/02-false-positive-out-of-scope.md
    assert:
      - type: contains-any
        value:
          - 'NO_ISSUES'
          - 'スコープ外'
          - '別 PR'
          - '記録のみ'
          - '健全'

  # Test case 3: Fallback — empty diff should return NO_REVIEW
  - description: 'Return NO_REVIEW when diff is empty'
    vars:
      diff: file://../fixtures/03-fallback-diff-empty.md
    assert:
      - type: contains
        value: 'NO_REVIEW'
      - type: contains
        value: 'rr-upstream-plangate-exec-conformance-001'

outputPath: ./output.json

defaultTest:
  options:
    provider: openai:gpt-4o-mini
